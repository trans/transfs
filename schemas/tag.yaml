description: Add tags to a document
positional: [id, tags]
properties:
  id:
    type: string
    description: Document id or unique prefix
    x-ui: { control: document-query }
  tags:
    type: array
    description: Tags to add (e.g. finance q2 stars=4)
    x-ui: { control: tag-chooser }
required: [id, tags]
